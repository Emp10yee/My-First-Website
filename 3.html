                <h3 class="fallintro">2024년도 9월 1일, 무인도에서 처음 맞이하는 가을의 모습은 어떨까요?<br> 두근거리는 만큼 즐거운 일이 가득할 거에요.</h3>
                <div class="tobecontinue">
                    <script>
                        var today = new Date();
                        var year = today.getFullYear();
                        var month = today.getMonth()+1;
                        var day = today.getDate();
                        var hour = today.getHours();
                        var minute = today.getMinutes();
                        document.write('오늘은'+year+'년'+month+'월'+day+'일 입니다.'+'<br/>');
                        document.write('현재 시간은'+hour+'시'+minute+'분 입니다.');
                    </script>
                    <br><br><br>
                    <script>
                        var today = new Date();
                        var year = today.getFullYear();
                        var date1 = new Date("September 1, 2024");
                        var diff = date1.getTime() - today.getTime();
                        var days = Math.floor(diff / (1000 * 60 * 60 * 24));
                        document.write('가을까지 앞으로 ' + days + '일 남았습니다.');
                    </script>
